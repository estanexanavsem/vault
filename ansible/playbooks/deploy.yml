---
- name: Build Vault release locally
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_build_base: "{{ playbook_dir }}/../../.deploy/build"
    vault_admin_root: "{{ playbook_dir }}/../../frontend/admin"
    vault_guest_root: "{{ playbook_dir }}/../../frontend/guest"
    vault_admin_dependency_marker: "{{ vault_admin_root }}/node_modules/.vault-npm-ci-lock.sha256"
    vault_guest_dependency_marker: "{{ vault_guest_root }}/node_modules/.vault-npm-ci-lock.sha256"

  tasks:
    - name: Register release id
      ansible.builtin.set_fact:
        vault_release_id: "{{ lookup('pipe', 'date -u +%Y%m%d%H%M%S') }}-{{ lookup('pipe', 'git rev-parse --short HEAD 2>/dev/null || echo local') }}"

    - name: Register build directory
      ansible.builtin.set_fact:
        vault_build_root: "{{ vault_build_base }}/{{ vault_release_id }}"

    - name: Remove previous build directory for this release
      ansible.builtin.file:
        path: "{{ vault_build_root }}"
        state: absent

    - name: Create build directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ vault_build_root }}/backend"
        - "{{ vault_build_root }}/admin"
        - "{{ vault_build_root }}/guest"

    - name: Register frontend dependency state
      ansible.builtin.set_fact:
        vault_admin_package_lock_checksum: "{{ lookup('ansible.builtin.file', vault_admin_root + '/package-lock.json') | hash('sha256') }}"
        vault_guest_package_lock_checksum: "{{ lookup('ansible.builtin.file', vault_guest_root + '/package-lock.json') | hash('sha256') }}"
        vault_admin_dependency_marker_checksum: "{{ lookup('ansible.builtin.file', vault_admin_dependency_marker, errors='ignore') | default('', true) | trim }}"
        vault_guest_dependency_marker_checksum: "{{ lookup('ansible.builtin.file', vault_guest_dependency_marker, errors='ignore') | default('', true) | trim }}"

    - name: Register frontend dependency install plan
      ansible.builtin.set_fact:
        vault_admin_dependencies_stale: "{{ vault_admin_dependency_marker_checksum != vault_admin_package_lock_checksum }}"
        vault_guest_dependencies_stale: "{{ vault_guest_dependency_marker_checksum != vault_guest_package_lock_checksum }}"

    - name: Start backend binary build
      ansible.builtin.command:
        cmd: go build -trimpath -ldflags "-s -w" -o "{{ vault_build_root }}/backend/vault-api" .
        chdir: "{{ playbook_dir }}/../../backend"
      environment:
        GOOS: "{{ hostvars[groups['vault'][0]].vault_build_goos | default('linux') }}"
        GOARCH: "{{ hostvars[groups['vault'][0]].vault_build_goarch | default('amd64') }}"
        CGO_ENABLED: "{{ hostvars[groups['vault'][0]].vault_build_cgo_enabled | default('1') }}"
      async: 1800
      poll: 0
      register: vault_backend_build_job

    - name: Start admin dependency install
      ansible.builtin.command:
        cmd: npm ci
        chdir: "{{ vault_admin_root }}"
      async: 1800
      poll: 0
      register: vault_admin_npm_job
      when: vault_admin_dependencies_stale | bool

    - name: Start guest dependency install
      ansible.builtin.command:
        cmd: npm ci
        chdir: "{{ vault_guest_root }}"
      async: 1800
      poll: 0
      register: vault_guest_npm_job
      when: vault_guest_dependencies_stale | bool

    - name: Wait for admin dependency install
      ansible.builtin.async_status:
        jid: "{{ vault_admin_npm_job.ansible_job_id }}"
      register: vault_admin_npm_result
      until: vault_admin_npm_result.finished
      retries: 120
      delay: 5
      when: vault_admin_dependencies_stale | bool

    - name: Record admin dependency checksum
      ansible.builtin.copy:
        content: "{{ vault_admin_package_lock_checksum }}\n"
        dest: "{{ vault_admin_dependency_marker }}"
        mode: "0644"
      when: vault_admin_dependencies_stale | bool

    - name: Wait for guest dependency install
      ansible.builtin.async_status:
        jid: "{{ vault_guest_npm_job.ansible_job_id }}"
      register: vault_guest_npm_result
      until: vault_guest_npm_result.finished
      retries: 120
      delay: 5
      when: vault_guest_dependencies_stale | bool

    - name: Record guest dependency checksum
      ansible.builtin.copy:
        content: "{{ vault_guest_package_lock_checksum }}\n"
        dest: "{{ vault_guest_dependency_marker }}"
        mode: "0644"
      when: vault_guest_dependencies_stale | bool

    - name: Start admin frontend build
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ vault_admin_root }}"
      async: 1800
      poll: 0
      register: vault_admin_build_job

    - name: Start guest frontend build
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ vault_guest_root }}"
      async: 1800
      poll: 0
      register: vault_guest_build_job

    - name: Wait for backend binary build
      ansible.builtin.async_status:
        jid: "{{ vault_backend_build_job.ansible_job_id }}"
      register: vault_backend_build_result
      until: vault_backend_build_result.finished
      retries: 120
      delay: 5

    - name: Wait for admin frontend build
      ansible.builtin.async_status:
        jid: "{{ vault_admin_build_job.ansible_job_id }}"
      register: vault_admin_build_result
      until: vault_admin_build_result.finished
      retries: 120
      delay: 5

    - name: Wait for guest frontend build
      ansible.builtin.async_status:
        jid: "{{ vault_guest_build_job.ansible_job_id }}"
      register: vault_guest_build_result
      until: vault_guest_build_result.finished
      retries: 120
      delay: 5

    - name: Copy admin dist
      ansible.builtin.copy:
        src: "{{ vault_admin_root }}/dist/"
        dest: "{{ vault_build_root }}/admin/"
        mode: preserve

    - name: Copy guest dist
      ansible.builtin.copy:
        src: "{{ vault_guest_root }}/dist/"
        dest: "{{ vault_build_root }}/guest/"
        mode: preserve

    - name: Register release facts for remote play
      ansible.builtin.add_host:
        name: vault_release
        vault_release_id: "{{ vault_release_id }}"
        vault_build_root: "{{ vault_build_root }}"

- name: Deploy Vault release to VPS
  hosts: vault
  become: true
  gather_facts: false
  vars:
    vault_release_id: "{{ hostvars['vault_release'].vault_release_id }}"
    vault_build_root: "{{ hostvars['vault_release'].vault_build_root }}"
    vault_release_path: "{{ vault_app_root }}/releases/{{ vault_release_id }}"

  tasks:
    - name: Create remote release directory
      ansible.builtin.file:
        path: "{{ vault_release_path }}"
        state: directory
        owner: "{{ vault_app_user }}"
        group: "{{ vault_app_user }}"
        mode: "0755"

    - name: Upload release via rsync
      ansible.posix.synchronize:
        src: "{{ vault_build_root }}/"
        dest: "{{ vault_release_path }}/"
        archive: true
        compress: true
        delete: true
        private_key: "{{ ansible_ssh_private_key_file | default(omit) }}"
        use_ssh_args: true
      delegate_to: localhost
      become: false

    - name: Set release ownership
      ansible.builtin.file:
        path: "{{ vault_release_path }}"
        state: directory
        owner: "{{ vault_app_user }}"
        group: "{{ vault_app_user }}"
        recurse: true

    - name: Activate current release
      ansible.builtin.file:
        src: "{{ vault_release_path }}"
        dest: "{{ vault_app_root }}/current"
        state: link
        force: true
        owner: "{{ vault_app_user }}"
        group: "{{ vault_app_user }}"

    - name: Restart Vault API
      ansible.builtin.systemd:
        name: "{{ vault_service_name }}"
        state: restarted
        daemon_reload: true

    - name: Wait for Vault readiness
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ vault_api_port }}/ready"
        status_code: 200
      register: vault_ready
      retries: 20
      delay: 1
      until: vault_ready.status == 200

    - name: Remove old releases
      ansible.builtin.shell: |
        set -euo pipefail
        find "{{ vault_app_root }}/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
          | sort -rn \
          | awk -v keep="{{ vault_keep_releases }}" 'NR > keep {print $2}' \
          | xargs -r rm -rf
      args:
        executable: /bin/bash
      changed_when: false
