---
- name: Provision Vault VPS
  hosts: vault
  become: true
  gather_facts: true

  pre_tasks:
    - name: Validate required secrets are changed
      ansible.builtin.assert:
        that:
          - vault_panel_password != 'change-this-before-first-deploy'
        fail_msg: "Copy group_vars/vault.example.yml to group_vars/vault.yml and replace all secret placeholders."

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ansible
          - apt-transport-https
          - build-essential
          - ca-certificates
          - curl
          - debian-archive-keyring
          - debian-keyring
          - git
          - gnupg
          - python3
          - python3-pip
          - rsync
          - sqlite3
          - sudo
          - ufw
        state: present
        update_cache: true

    - name: Download Caddy apt key
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        dest: /tmp/caddy-stable-gpg.key
        mode: "0644"

    - name: Install Caddy apt key
      ansible.builtin.command:
        cmd: gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /tmp/caddy-stable-gpg.key
        creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

    - name: Add Caddy apt repository
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
        dest: /etc/apt/sources.list.d/caddy-stable.list
        mode: "0644"

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: true

    - name: Allow SSH through UFW before enabling firewall
      ansible.builtin.command:
        cmd: "ufw allow {{ ansible_port | default(22) }}/tcp"
      register: ufw_allow_ssh
      changed_when: "'Rules updated' in ufw_allow_ssh.stdout"

    - name: Allow HTTP through UFW
      ansible.builtin.command:
        cmd: ufw allow 80/tcp
      register: ufw_allow_http
      changed_when: "'Rules updated' in ufw_allow_http.stdout"

    - name: Allow HTTPS through UFW
      ansible.builtin.command:
        cmd: ufw allow 443/tcp
      register: ufw_allow_https
      changed_when: "'Rules updated' in ufw_allow_https.stdout"

    - name: Deny incoming traffic by default with UFW
      ansible.builtin.command:
        cmd: ufw default deny incoming
      register: ufw_default_incoming
      changed_when: "'Default incoming policy changed' in ufw_default_incoming.stdout"

    - name: Allow outgoing traffic by default with UFW
      ansible.builtin.command:
        cmd: ufw default allow outgoing
      register: ufw_default_outgoing
      changed_when: "'Default outgoing policy changed' in ufw_default_outgoing.stdout"

    - name: Enable UFW
      ansible.builtin.command:
        cmd: ufw --force enable
      register: ufw_enable
      changed_when: "'Firewall is active and enabled' in ufw_enable.stdout"

    - name: Create Vault service user
      ansible.builtin.user:
        name: "{{ vault_app_user }}"
        system: true
        home: "{{ vault_app_root }}"
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create Vault directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default(vault_app_user) }}"
        group: "{{ item.group | default(vault_app_user) }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ vault_app_root }}", mode: "0755" }
        - { path: "{{ vault_app_root }}/releases", mode: "0755" }
        - { path: "{{ vault_app_root }}/shared", mode: "0750" }
        - { path: "{{ vault_app_root }}/shared/data", mode: "0750" }
        - { path: "{{ vault_app_root }}/shared/env", mode: "0750" }

    - name: Install Vault API environment
      ansible.builtin.template:
        src: ../templates/vault-api.env.j2
        dest: "{{ vault_app_root }}/shared/env/vault-api.env"
        owner: "{{ vault_app_user }}"
        group: "{{ vault_app_user }}"
        mode: "0600"

    - name: Install Vault API systemd unit
      ansible.builtin.template:
        src: ../templates/vault-api.service.j2
        dest: "/etc/systemd/system/{{ vault_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
      notify: Reload systemd

    - name: Install Caddyfile
      ansible.builtin.template:
        src: ../templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: "0644"
        validate: caddy validate --config %s --adapter caddyfile
      notify: Reload Caddy

    - name: Enable services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - caddy

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
